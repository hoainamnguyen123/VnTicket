server:
  port: ${PORT:8080}

spring:
  application:
    name: vnticket-backend
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10        # Tăng từ 5 → 10 (Neon free cho phép ~20 connections)
      minimum-idle: 3              # Tăng từ 2 → 3
      connection-timeout: 5000     # Fail nhanh 5s thay vì chờ 30s mặc định
      max-lifetime: 600000         # 10 phút — phù hợp với Neon free (có idle timeout)
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
      jedis:
        pool:
          max-active: 10           # Tăng từ 5 → 10
          max-idle: 5              # Tăng từ 3 → 5
          min-idle: 2              # Tăng từ 1 → 2
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5671}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  resend:
    api-key: ${RESEND_API_KEY}
  jwt:
    secret: ${JWT_SECRET}
    expirationMs: 86400000
    jwtRefreshExpirationMs: 864000000
  google:
    clientId: ${GOOGLE_CLIENT_ID}
  vnpay:
    tmnCode: ${VNPAY_TMN_CODE}
    hashSecret: ${VNPAY_HASH_SECRET}
    payUrl: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    returnUrl: ${VNPAY_RETURN_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cookie:
    secure: true
    sameSite: None
  reservation:
    ttlMinutes: 15

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
