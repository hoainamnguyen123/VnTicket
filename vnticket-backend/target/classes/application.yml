server:
  port: 8080

spring:
  application:
    name: vnticket-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/vnticket
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15        # Số connection DB tối đa (mặc định Spring = 10)
      minimum-idle: 5              # Giữ sẵn 5 connection, không phải tạo mới mỗi lần
      connection-timeout: 5000     # 5 giây — fail nhanh thay vì chờ 30s mặc định
  data:
    redis:
      host: localhost
      port: 6379
      jedis:
        pool:
          max-active: 15           # Tăng từ 10 → 15 (số Redis connection đồng thời)
          max-idle: 8              # Tăng từ 5 → 8 (giữ sẵn chờ dùng)
          min-idle: 2              # Tăng từ 1 → 2
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  resend:
    api-key: "re_..." # Điền API Key của Resend vào đây
  jwt:
    secret: VNTicketSuperSecretKeyForJwtGenerationMustBeLongEnoughToBeSecureVNTicketSuperSecretKeyForJwtGenerationMustBeLongEnoughToBeSecure
    expirationMs: 86400000 # 5 minutes
    jwtRefreshExpirationMs: 864000000 # 1 day
  google:
    clientId: 626920740184-b50brg5oc6psqva23adt7f9a7632fhp4.apps.googleusercontent.com
  vnpay:
    tmnCode: JLQON1G3
    hashSecret: R1HINBAXZXBR7SOMK9IZEJBQTW3MT4WD
    payUrl: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    returnUrl: http://localhost:5173/payment-return
  reservation:
    ttlMinutes: 15
  cors:
    allowed-origins: http://localhost:5173
  cookie:
    secure: false
    sameSite: Lax

cloudinary:
  cloud-name: "dilx7nhbv"
  api-key: "342651966745924"
  api-secret: "cC3wjZ9ZtdQKTqL1eVrnxVJiphI"

resilience4j:
  circuitbreaker:
    instances:
      redisInventory:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
